name: CI/CD Backend

on:
  push:
    branches:
      - deploy

jobs:
  build-push-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compilar proyecto Spring Boot
        run: |
          cd back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Construir imagen Docker
        run: |
          cd back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker build -t backend-despacho .

      - name: Etiquetar imagen
        run: |
          docker tag backend-despacho:latest ${{ secrets.ECR_REPO_URL_BACKEND }}:latest

      - name: Subir imagen a ECR
        run: |
          docker push ${{ secrets.ECR_REPO_URL_BACKEND }}:latest