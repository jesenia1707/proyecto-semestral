spring.application.name=Springboot-API-REST
server.port=8081
spring.web.allow-cors=true

# Configuración MySQL Docker
spring.datasource.url=jdbc:mysql://mysql-despacho:3306/despacho?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.platform=mysql

# Hibernate
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html

# Desactivar Swagger temporalmente
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false